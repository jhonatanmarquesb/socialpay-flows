<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SocialPay Flows</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    body { background-color: #000; color: white; overflow: hidden; font-family: sans-serif; margin: 0; padding: 0; }
    .arrow-down { color: #52525b; font-size: 1.5rem; font-weight: bold; margin: 0.25rem 0; text-align: center; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #18181b; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="app" class="flex h-screen w-full">

    <div v-if="!user" class="flex h-screen bg-black items-center justify-center font-sans w-full">
      <form @submit.prevent="handleAuth" class="bg-gray-900 p-8 rounded-xl shadow-2xl w-96 border border-gray-800">
        <h2 class="text-white text-2xl font-bold mb-6 text-center">SocialPay Flows</h2>
        <input type="email" placeholder="E-mail corporativo" v-model="email" required class="w-full mb-4 p-3 rounded bg-gray-800 text-white border border-gray-700 focus:outline-blue-500" />
        <input type="password" placeholder="Senha" v-model="password" required class="w-full mb-6 p-3 rounded bg-gray-800 text-white border border-gray-700 focus:outline-blue-500" />
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded transition-all">
          {{ isRegister ? 'Criar Conta' : 'Entrar no Sistema' }}
        </button>
        <p class="text-gray-400 text-sm text-center mt-4 cursor-pointer hover:text-white" @click="isRegister = !isRegister">
          {{ isRegister ? 'Já tem conta? Faça login' : 'Não tem conta? Cadastre-se' }}
        </p>
      </form>
    </div>

    <template v-else>
      
      <div class="w-64 bg-gray-900 border-r border-gray-800 p-4 flex flex-col justify-between shrink-0">
        <div>
          <div class="flex items-center justify-between mb-6 pb-4 border-b border-gray-800">
            <span class="text-white font-bold text-lg">SocialPay</span>
            <div class="flex items-center gap-2" :title="user.email">
              <div class="bg-blue-600 text-white h-7 w-7 rounded-full flex items-center justify-center font-bold text-xs uppercase">
                {{ getUserFirstName(user.email).charAt(0) }}
              </div>
              <span class="text-xs text-gray-300 font-medium">{{ getUserFirstName(user.email) }}</span>
            </div>
          </div>
          
          <button @click="createFlow" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-3 rounded text-sm mb-4 transition-all flex items-center justify-center gap-1">
            <span>+ Novo Fluxo</span>
          </button>

          <div class="space-y-1 overflow-y-auto max-h-[calc(100vh-220px)] pr-1">
            <label class="text-gray-500 text-[10px] font-bold uppercase tracking-wider block mb-2 px-2">Nuvem da Equipe</label>
            <div v-for="f in flows" :key="f.id" @click="currentId = f.id" :class="['group flex flex-col p-2.5 rounded cursor-pointer transition-all text-sm', currentId === f.id ? 'bg-gray-800 text-white' : 'text-gray-400 hover:bg-gray-800/50']">
              <div class="flex justify-between items-center w-full">
                <span class="truncate font-semibold max-w-[150px]">{{ f.clientName }}</span>
                <button @click.stop="deleteFlow(f.id)" class="opacity-0 group-hover:opacity-100 text-gray-500 hover:text-red-400 text-xs px-1">✕</button>
              </div>
              <span class="text-[10px] text-gray-500 mt-1">por {{ getUserFirstName(f.createdBy) }}</span>
            </div>
          </div>
        </div>
        
        <button @click="logout" class="text-xs text-gray-500 hover:text-red-400 border-t border-gray-800 pt-4 w-full text-left transition-all font-medium flex items-center gap-1">
          <span>🚪 Sair da conta</span>
        </button>
      </div>

      <div class="w-80 bg-white p-5 overflow-y-auto border-r border-gray-200 flex flex-col shrink-0 text-black">
        <div class="space-y-2 mb-4">
          <h2 class="text-lg font-bold text-gray-800">Painel de Edição</h2>
          <button @click="exportImage" class="w-full bg-gray-900 text-white text-xs font-bold py-2.5 rounded hover:bg-black transition-all shadow">
            ↓ Baixar Fluxo (Imagem)
          </button>
          <button v-if="currentFlow" @click="duplicateFlow" class="w-full bg-blue-50 text-blue-600 text-xs font-bold py-2 rounded hover:bg-blue-100 transition-all border border-blue-200 flex items-center justify-center gap-1">
            <span>📋 Copiar este Fluxo</span>
          </button>
        </div>

        <div v-if="currentFlow" class="space-y-5 text-xs mt-4 pb-20">
          <div>
            <label class="block font-bold text-gray-700 mb-1">Nome do Cliente ou Nicho</label>
            <input type="text" :value="currentFlow.clientName" @input="updateClientName($event.target.value)" class="w-full border border-gray-300 p-2 rounded bg-gray-50 focus:outline-blue-500 font-semibold text-gray-900 text-sm" />
          </div>
          
          <div class="border-t pt-4">
            <div class="flex items-center justify-between mb-3">
              <label class="font-bold text-gray-500 uppercase tracking-wider text-[10px]">Passos do Fluxo</label>
              <button @click="addStep" class="bg-blue-50 text-blue-600 hover:bg-blue-100 font-bold px-2 py-1 rounded text-[11px] transition-all">
                + Adicionar Passo
              </button>
            </div>

            <div class="space-y-4">
              <div v-for="(step, index) in currentFlow.steps" :key="step.id" class="bg-gray-50 p-3 rounded-lg border border-gray-200 relative">
                <div class="flex items-center justify-between mb-2 pb-1 border-b border-gray-200">
                  <span class="font-bold text-gray-700 text-sm">Passo {{ index + 1 }}</span>
                  <div class="flex items-center gap-2">
                    <select v-model="step.type" @change="saveStepsToFirebase" class="bg-white border text-[10px] p-0.5 rounded font-medium text-gray-600">
                      <option value="linear">Linear</option>
                      <option value="split">Paralelo</option>
                    </select>
                    <button @click="removeStep(index)" class="text-red-500 hover:text-red-700 font-bold text-xs px-1" title="Excluir Passo">
                      🗑️
                    </button>
                  </div>
                </div>

                <div v-if="step.type === 'linear'" class="space-y-2">
                  <div>
                    <span class="text-[9px] text-gray-400 font-mono block">TÍTULO</span>
                    <input type="text" v-model="step.title" @input="saveStepsToFirebase" class="w-full border p-1.5 rounded bg-white text-gray-800 font-medium" />
                  </div>
                  <div>
                    <span class="text-[9px] text-gray-400 font-mono block">SUBTEXTO</span>
                    <input type="text" v-model="step.sub" @input="saveStepsToFirebase" class="w-full border p-1.5 rounded bg-white text-gray-600" />
                  </div>
                </div>

                <div v-else class="space-y-2 bg-blue-50/50 p-2 rounded border border-blue-100">
                  <div>
                    <span class="text-[9px] text-blue-600 font-bold font-mono block">LADO A (SocialPay) - TÍTULO</span>
                    <input type="text" v-model="step.titleA" @input="saveStepsToFirebase" class="w-full border p-1.5 rounded bg-white text-gray-800 font-medium" />
                  </div>
                  <div class="mb-2">
                    <span class="text-[9px] text-blue-600 font-bold font-mono block">LADO A - SUBTEXTO</span>
                    <input type="text" v-model="step.subA" @input="saveStepsToFirebase" class="w-full border p-1.5 rounded bg-white text-gray-600" />
                  </div>
                  <hr class="border-blue-100">
                  <div class="mt-2">
                    <span class="text-[9px] text-green-600 font-bold font-mono block">LADO B (Estabelecimento) - TÍTULO</span>
                    <input type="text" v-model="step.titleB" @input="saveStepsToFirebase" class="w-full border p-1.5 rounded bg-white text-gray-800 font-medium" />
                  </div>
                  <div>
                    <span class="text-[9px] text-green-600 font-bold font-mono block">LADO B - SUBTEXTO</span>
                    <input type="text" v-model="step.subB" @input="saveStepsToFirebase" class="w-full border p-1.5 rounded bg-white text-gray-600" />
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
        <div v-else class="text-gray-400 text-sm text-center mt-10">
          Crie ou selecione um fluxo para editar.
        </div>
      </div>

      <div id="fluxo-visual" class="flex-1 p-8 overflow-y-auto flex flex-col items-center justify-start bg-black text-center relative text-white">
        
        <div id="fluxo-capture" class="w-full max-w-[620px] flex flex-col items-center bg-black p-4">
          <template v-if="currentFlow">
            <h1 class="text-white text-2xl font-bold mb-8 border-b border-gray-800 pb-3 w-full">
              Fluxo: {{ currentFlow.clientName }}
            </h1>

            <div v-for="(step, index) in currentFlow.steps" :key="step.id" class="w-full flex flex-col items-center">
              
              <div v-if="step.type === 'linear'" :class="['text-black w-[450px] p-4 rounded-md shadow-md text-center', getStepColorClass(index)]">
                <p class="font-bold text-sm text-center">{{ step.title }}</p>
                <p class="text-xs opacity-80 mt-1 text-center whitespace-pre-line">{{ step.sub }}</p>
              </div>

              <div v-else class="w-full flex flex-col items-center">
                <p class="text-gray-500 text-[11px] my-2 tracking-wide italic">A partir daqui, dois caminhos acontecem em paralelo</p>
                
                <div class="flex w-[580px] justify-between relative my-2">
                  <div class="flex flex-col items-center w-[275px]">
                    <div class="bg-[#EBE9E1] text-black w-full py-1.5 rounded-full mb-3 shadow-md font-bold text-xs">SocialPay (identificação)</div>
                    <div class="arrow-down">↓</div>
                    <div class="bg-[#E3F2FD] text-black w-full p-3.5 rounded-md shadow-md h-28 flex flex-col justify-center border-l-4 border-blue-500">
                      <p class="font-bold text-sm text-[#1565C0] leading-tight text-center">{{ step.titleA }}</p>
                      <p class="text-[11px] text-[#1976D2] mt-1 leading-normal text-center">{{ step.subA }}</p>
                    </div>
                  </div>

                  <div class="flex flex-col items-center w-[275px]">
                    <div class="bg-[#EBE9E1] text-black w-full py-1.5 rounded-full mb-3 shadow-md font-bold text-xs">Restaurante (pagamento)</div>
                    <div class="arrow-down">↓</div>
                    <div class="bg-[#E8F5E9] text-black w-full p-3.5 rounded-md shadow-md h-28 flex flex-col justify-center border-l-4 border-green-500">
                      <p class="font-bold text-sm text-[#2E7D32] leading-tight text-center">{{ step.titleB }}</p>
                      <p class="text-[11px] text-[#388E3C] mt-1 leading-normal text-center">{{ step.subB }}</p>
                    </div>
                  </div>
                </div>

                <div class="flex justify-center w-[580px] text-gray-600 text-lg font-bold my-1">
                  <span class="mr-28">↘</span>
                  <span class="ml-28">↙</span>
                </div>
              </div>

              <div v-if="index < currentFlow.steps.length - 1" class="arrow-down">↓</div>
            </div>

            <p class="text-gray-600 text-[10px] mt-12 max-w-[450px] border-t border-gray-900 pt-4 w-full">
              Gerado por {{ getUserFirstName(currentFlow.createdBy) }} • A SocialPay não processa dinheiro — apenas identifica, vincula e transforma vendas existentes em inteligência.
            </p>
          </template>
          <div v-else class="text-gray-500 mt-20">Nenhum fluxo selecionado.</div>
        </div>

      </div>
    </template>
  </div>

  <script>
    // 1. CREDENCIAIS DO BANCO
    const firebaseConfig = {
      apiKey: "AIzaSyAnxNnY7OasZ5swEsD35bFU-0o84xdGEGo",
      authDomain: "fluxo-clientes.firebaseapp.com",
      projectId: "fluxo-clientes",
      storageBucket: "fluxo-clientes.firebasestorage.app",
      messagingSenderId: "902170053898",
      appId: "1:902170053898:web:34d62cc7b1bec31eedbef3"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();

    // MODELO ORIGINAL DA IMAGEM TOTALMENTE PRONTO
    const STEPS_MODELO_ORIGINAL = () => [
      { id: 's1', type: 'linear', title: '1. Cliente chega e senta na mesa', sub: 'Tudo começa como em qualquer restaurante, sem mudança' },
      { id: 's2', type: 'linear', title: '2. Cliente escaneia o QR code da SocialPay', sub: 'Apenas identificação — telefone ou e-mail\nNenhum valor é cobrado aqui' },
      { id: 's3', type: 'linear', title: '3. Tela de consentimento explícito', sub: '"Aceito que minhas compras aqui gerem meu perfil"\nOpção de aceitar ou recusar, sem afetar o atendimento' },
      { 
        id: 's4', 
        type: 'split', 
        titleA: '4a. Perfil criado/atualizado', subA: 'Aguarda vínculo com a venda ainda sem nenhum valor associado',
        titleB: '4b. Pedido feito e pago normalmente', subB: 'Garçom, maquininha ou PDV próprio do restaurante, como sempre foi'
      },
      { id: 's5', type: 'linear', title: '5. Restaurante vincula a venda ao perfil', sub: 'Por telefone, número da mesa ou horário\nManual no início, automático depois (via PDV)' },
      { id: 's6', type: 'linear', title: 'Venda + perfil = dado completo', sub: 'Item, valor e horário, agora ligados a uma pessoa\nSocialPay nunca viu nem tocou o dinheiro' },
      { id: 's7', type: 'linear', title: '6. Dashboard atualizado para o restaurante', sub: 'Mesmo painel de sempre, dado vindo do PDV' },
      { id: 's8', type: 'linear', title: '7. Cliente recebe recompensa por WhatsApp/SMS', sub: 'Cashback resgatado direto na próxima visita' }
    ];

    const { createApp } = Vue;

    createApp({
      data() {
        return {
          user: null,
          flows: [],
          currentId: '',
          email: '',
          password: '',
          isRegister: false,
          unsubscribeDB: null
        }
      },
      computed: {
        currentFlow() {
          return this.flows.find(f => f.id === this.currentId) || null;
        }
      },
      mounted() {
        auth.onAuthStateChanged(user => {
          this.user = user;
          if (user) {
            this.loadFlows();
          } else {
            if (this.unsubscribeDB) this.unsubscribeDB();
          }
        });
      },
      methods: {
        async handleAuth() {
          try {
            if (this.isRegister) {
              await auth.createUserWithEmailAndPassword(this.email, this.password);
            } else {
              await auth.signInWithEmailAndPassword(this.email, this.password);
            }
          } catch (error) {
            alert("Erro na autenticação: " + error.message);
          }
        },
        logout() {
          if (this.unsubscribeDB) this.unsubscribeDB();
          this.flows = [];
          this.currentId = '';
          auth.signOut();
        },
        getUserFirstName(fullEmail) {
          if (!fullEmail) return "Equipe";
          return fullEmail.split('@')[0].replace(/^\w/, c => c.toUpperCase());
        },
        loadFlows() {
          this.unsubscribeDB = db.collection("flows").onSnapshot(snapshot => {
            const flowsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            flowsData.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            this.flows = flowsData;
            
            // INTELIGÊNCIA: Se não houver fluxos criados, força o primeiro a ser o Modelo Pronto
            if (flowsData.length === 0) {
              this.createFirstDefaultFlow();
            } else if (!this.currentId) {
              this.currentId = flowsData[0].id;
            }
          });
        },
        async createFirstDefaultFlow() {
          try {
            const primeiro = {
              clientName: 'Restaurante Físico (Modelo)',
              createdBy: this.user.email,
              steps: STEPS_MODELO_ORIGINAL(),
              createdAt: new Date().toISOString()
            };
            const docRef = await db.collection("flows").add(primeiro);
            this.currentId = docRef.id;
          } catch (e) {
            console.error("Erro ao criar fluxo inicial: ", e);
          }
        },
        async createFlow() {
          try {
            const novo = {
              clientName: `Novo Cliente ${this.flows.length + 1}`,
              createdBy: this.user.email,
              steps: STEPS_MODELO_ORIGINAL(), // já nasce pré-preenchido facilitando a edição
              createdAt: new Date().toISOString()
            };
            const docRef = await db.collection("flows").add(novo);
            this.currentId = docRef.id;
          } catch (error) {
            alert("Erro de sincronização ao criar fluxo: " + error.message);
          }
        },
        async duplicateFlow() {
          if (!this.currentFlow) return;
          try {
            const copia = {
              clientName: `${this.currentFlow.clientName} (Cópia)`,
              createdBy: this.user.email,
              steps: JSON.parse(JSON.stringify(this.currentFlow.steps)),
              createdAt: new Date().toISOString()
            };
            const docRef = await db.collection("flows").add(copia);
            this.currentId = docRef.id;
            alert("Fluxo copiado e duplicado com sucesso na nuvem!");
          } catch (error) {
            alert("Erro ao copiar fluxo: " + error.message);
          }
        },
        async updateClientName(value) {
          if (!this.currentId) return;
          const flow = this.flows.find(f => f.id === this.currentId);
          if (flow) flow.clientName = value;
          await db.collection("flows").doc(this.currentId).update({ clientName: value });
        },
        addStep() {
          if (!this.currentFlow) return;
          this.currentFlow.steps.push({
            id: 'step_' + Date.now() + Math.random().toString(36).substr(2, 4),
            type: 'linear',
            title: 'Novo Passo Adicionado',
            sub: 'Descreva a regra de negócio ou ação aqui.'
          });
          this.saveStepsToFirebase();
        },
        removeStep(index) {
          if (!this.currentFlow) return;
          this.currentFlow.steps.splice(index, 1);
          this.saveStepsToFirebase();
        },
        async saveStepsToFirebase() {
          if (!this.currentId || !this.currentFlow) return;
          await db.collection("flows").doc(this.currentId).update({
            steps: this.currentFlow.steps
          });
        },
        async deleteFlow(id) {
          if (window.confirm("Deseja deletar este fluxo permanentemente da nuvem da equipe?")) {
            await db.collection("flows").doc(id).delete();
            if (this.currentId === id) this.currentId = '';
          }
        },
        getStepColorClass(index) {
          const colors = [
            'bg-[#EBE9E1]', 
            'bg-[#E3F2FD] text-[#1565C0]', 
            'bg-[#EDE7F6] text-[#4527A0]', 
            'bg-[#FBE9E7] text-[#D84315]'
          ];
          return colors[index % colors.length];
        },
        async exportImage() {
          const element = document.getElementById('fluxo-capture');
          if (!element) return;
          const canvas = await html2canvas(element, {
            backgroundColor: '#000000',
            logging: false,
            scale: 2,
            useCORS: true
          });
          const link = document.createElement('a');
          link.download = `Jornada_SocialPay_${this.currentFlow.clientName}.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
